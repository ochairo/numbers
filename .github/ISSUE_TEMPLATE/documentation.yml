name: Documentation improvement
description: Report missing, confusing, or incorrect documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this form for documentation gaps, unclear explanations, incorrect examples, or missing migration notes.
  - type: input
    id: package_name
    attributes:
      label: Package
      placeholder: "@ochairo/numbers"
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page, file, or section
      description: Link or path to the docs page, README section, or source file
      placeholder: README.md#usage
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      description: Describe the confusing, outdated, or missing content
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Proposed improvement
      description: What should the docs say or show instead?
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example or reference material
      description: Sample wording, code, screenshots, or links to similar docs
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for related documentation requests
          required: true
        - label: I included the page, file, or section when known
          required: true
